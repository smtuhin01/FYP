<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background-image: url('../picture/Background\ photo.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
    }
    .reset-container {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    input, button {
      width: 100%;
      padding: 0.75rem;
      margin: 0.5rem 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
  width: 100%;
  padding: 10px;
  background-color: #39424e;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background-color: #212730;
}

    .message {
      margin-top: 1rem;
      text-align: center;
      font-weight: bold;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <h2>Reset Your Password</h2>
    <input type="email" id="resetEmail" placeholder="Enter your email" required />
    <input type="password" id="newPassword" placeholder="Enter new password" required />
    <input type="password" id="confirmPassword" placeholder="Confirm new password" required />
    <button onclick="resetPassword()">Reset Password</button>
    <div class="message" id="message"></div>
  </div>

  <script>
    async function resetPassword() {
      const email = document.getElementById("resetEmail").value.trim();
      const newPassword = document.getElementById("newPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();
      const messageDiv = document.getElementById("message");

      messageDiv.textContent = "";
      messageDiv.className = "message";

      if (!email || !newPassword || !confirmPassword) {
        messageDiv.textContent = "Please fill in all fields.";
        messageDiv.classList.add("error");
        return;
      }

      if (newPassword.length < 4) {
        messageDiv.textContent = "Password must be at least 4 characters.";
        messageDiv.classList.add("error");
        return;
      }

      if (newPassword !== confirmPassword) {
        messageDiv.textContent = "Passwords do not match.";
        messageDiv.classList.add("error");
        return;
      }

      try {
        const response = await fetch("http://localhost:5001/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, newPassword }),
        });

        const data = await response.json();

        if (response.ok) {
          messageDiv.textContent = "✅ Password reset successful!";
          messageDiv.classList.add("success");
          setTimeout(() => {
            window.location.href = "login.html";
          }, 2000);
        } else {
          messageDiv.textContent = "❌ " + (data.message || data.error || "Reset failed.");
          messageDiv.classList.add("error");
        }
      } catch (err) {
        messageDiv.textContent = "❌ Network error.";
        messageDiv.classList.add("error");
      }
    }
  </script>
</body>
</html>
