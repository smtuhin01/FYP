<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecturer Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen p-6">
  <div class="max-w-5xl mx-auto bg-white p-6 rounded shadow">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-2xl font-bold">Lecturer Dashboard</h2>
      <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Logout</button>
    </div>
    <h3 class="text-lg font-semibold mb-4">Students</h3>
    <table class="w-full table-auto">
      <thead>
        <tr class="bg-gray-200">
          <th class="px-4 py-2">Name</th>
          <th class="px-4 py-2">Email</th>
        </tr>
      </thead>
      <tbody id="studentTableBody"></tbody>
    </table>
  </div>

  <script>
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('lecturerToken');
      window.location.href = 'login.html';
    });

    async function fetchStudents() {
      const token = localStorage.getItem('lecturerToken');
      const res = await fetch('http://localhost:5001/api/lecturer/students', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const students = await res.json();
      const tbody = document.getElementById('studentTableBody');

      students.forEach(({ student }) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="border px-4 py-2">
            <a href="lecturer-viewstudent.html?userId=${student._id}" class="text-blue-600 hover:underline">${student.name}</a>
          </td>
          <td class="border px-4 py-2">${student.email}</td>
        `;
        tbody.appendChild(row);
      });
    }

    fetchStudents();
  </script>
</body>
</html>
