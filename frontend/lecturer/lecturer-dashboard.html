<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecturer Dashboard | MRI Simulator</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .gradient-header {
      background: linear-gradient(to right, #2563eb, #10b981);
    }
    
    .student-row {
      transition: all 0.2s ease;
    }
    
    .student-row:hover {
      background-color: #f0f9ff;
    }
    
    .search-input:focus {
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3);
    }
    
    .empty-state {
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #6b7280;
    }

    /* Add animation for status update */
    @keyframes statusUpdate {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    
    .status-update {
      animation: statusUpdate 0.5s ease;
    }

    /* Add a refresh button style */
    .refresh-btn {
      transition: all 0.2s ease;
    }
    
    .refresh-btn:hover {
      transform: rotate(180deg);
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Navigation Header -->
  <header class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <h1 class="text-xl font-bold text-gray-800">MRI Simulator</h1>
          <span class="ml-2 px-2 py-1 text-xs font-medium text-white bg-blue-600 rounded-md">Lecturer Portal</span>
        </div>
        <div class="flex items-center">
          <button id="refreshBtn" class="refresh-btn flex items-center px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-md transition duration-300 mr-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </button>
          <button id="logoutBtn" class="flex items-center px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-md transition duration-150">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Logout
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Page Header -->
  <div class="gradient-header py-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-2xl font-bold text-white">Lecturer Dashboard</h2>
      <p class="mt-1 text-sm text-white text-opacity-90">Manage student simulations and provide feedback</p>
    </div>
  </div>
  
  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <!-- Overview Card -->
    <div class="grid grid-cols-1 md:grid-cols-1 gap-6 mb-8">
      <div class="bg-white overflow-hidden shadow rounded-lg">
        <div class="px-4 py-5 sm:p-6">
          <div class="flex items-center">
            <div class="flex-shrink-0 bg-blue-500 rounded-full p-3">
              <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
              </svg>
            </div>
            <div class="ml-5 w-0 flex-1">
              <dl>
                <dt class="text-sm font-medium text-gray-500 truncate">Total Students</dt>
                <dd class="text-lg font-medium text-gray-900" id="studentCount">-</dd>
              </dl>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Students List Section -->
    <div class="bg-white shadow overflow-hidden sm:rounded-lg">
      <div class="px-4 py-5 border-b border-gray-200 sm:px-6">
        <div class="flex justify-between items-center flex-wrap sm:flex-nowrap">
          <div>
            <h3 class="text-lg leading-6 font-medium text-gray-900">Student Simulations</h3>
            <p class="mt-1 text-sm text-gray-500">Review and provide feedback on student MRI simulation parameters</p>
          </div>
          <div class="mt-4 sm:mt-0">
            <div class="relative rounded-md shadow-sm">
              <input
                type="text"
                id="searchInput"
                placeholder="Search students..."
                class="search-input focus:ring-blue-500 focus:border-blue-500 block w-full pr-10 sm:text-sm border-gray-300 rounded-md py-2 px-3"
              />
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="bg-white overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Student</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="studentTableBody" class="bg-white divide-y divide-gray-200">
            <!-- Loading state -->
            <tr>
              <td colspan="3" class="px-6 py-4 text-sm font-medium text-gray-900">
                <div class="flex justify-center py-8">
                  <svg class="animate-spin h-8 w-8 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    
    <!-- Status notification -->
    <div id="statusNotification" class="fixed bottom-4 right-4 bg-green-100 border border-green-400 text-green-800 px-4 py-3 rounded-md shadow-lg hidden transform transition-all duration-300">
      <div class="flex items-center">
        <svg class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span id="notificationText">Status updated successfully</span>
      </div>
    </div>
  </main>
  
  <footer class="bg-white border-t border-gray-200 mt-8">
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
      <p class="text-center text-sm text-gray-500">© 2023 MRI Simulator. All rights reserved.</p>
    </div>
  </footer>
  
  <script>
    const logoutBtn = document.getElementById('logoutBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const searchInput = document.getElementById('searchInput');
    const tbody = document.getElementById('studentTableBody');
    const studentCountEl = document.getElementById('studentCount');
    const statusNotification = document.getElementById('statusNotification');
    const notificationText = document.getElementById('notificationText');
    let allStudents = [];

    // Check for return from review page
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const reviewCompleted = urlParams.get('reviewCompleted');
      const studentId = urlParams.get('studentId');
      
      if (reviewCompleted === 'true' && studentId) {
        showNotification('Student review completed successfully!', 'success');
        // Remove the query parameters without reloading the page
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    });

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('lecturerToken');
      window.location.href = 'lecturer-login.html';
    });
    
    refreshBtn.addEventListener('click', () => {
      refreshBtn.classList.add('animate-spin');
      fetchStudents().then(() => {
        setTimeout(() => {
          refreshBtn.classList.remove('animate-spin');
          showNotification('Dashboard refreshed', 'info');
        }, 500);
      });
    });

    async function fetchStudents() {
      try {
        const token = localStorage.getItem('lecturerToken');
        if (!token) {
          window.location.href = 'lecturer-login.html';
          return;
        }
        
        const res = await fetch('http://localhost:5001/api/lecturer/students', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!res.ok) {
          throw new Error('Failed to fetch students');
        }
        
        const students = await res.json();
        allStudents = students;
        
        // Update statistics
        studentCountEl.textContent = students.length;
        
        renderStudents(students);
      } catch (error) {
        console.error('Error fetching students:', error);
        tbody.innerHTML = `
          <tr>
            <td colspan="3" class="px-6 py-4">
              <div class="empty-state">
                <svg class="h-12 w-12 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p class="text-center">Error loading students. Please try again later.</p>
              </div>
            </td>
          </tr>
        `;
      }
    }

    function renderStudents(students) {
      if (students.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="3" class="px-6 py-4">
              <div class="empty-state">
                <svg class="h-12 w-12 text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                </svg>
                <p class="text-gray-500">No students found matching your search criteria</p>
              </div>
            </td>
          </tr>
        `;
        return;
      }
      
      tbody.innerHTML = '';
      students.forEach(({ student }) => {
        const row = document.createElement('tr');
        row.className = 'student-row hover:bg-gray-50';
        row.id = `student-${student._id}`;
        
        row.innerHTML = `
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="flex items-center">
              <div class="flex-shrink-0 h-10 w-10 flex items-center justify-center rounded-full bg-gray-100 text-gray-600">
                ${student.name.charAt(0).toUpperCase()}
              </div>
              <div class="ml-4">
                <div class="text-sm font-medium text-gray-900">${student.name}</div>
              </div>
            </div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${student.email}</td>
          <td class="px-6 py-4 whitespace-nowrap text-sm">
            <a 
              href="lecturer-viewstudent.html?userId=${student._id}" 
              class="text-blue-600 hover:text-blue-900 font-medium review-link"
              data-student-id="${student._id}"
            >
              Review Simulation
            </a>
          </td>
        `;
        tbody.appendChild(row);
      });

      // Add event listeners for tracking when reviews are completed
      document.querySelectorAll('.review-link').forEach(link => {
        link.addEventListener('click', function() {
          const studentId = this.getAttribute('data-student-id');
          localStorage.setItem('currentReviewingStudent', studentId);
        });
      });
    }

    // Function to show notification
    function showNotification(message, type = 'success') {
      notificationText.textContent = message;
      
      // Set background color based on type
      if (type === 'success') {
        statusNotification.className = 'fixed bottom-4 right-4 bg-green-100 border border-green-400 text-green-800 px-4 py-3 rounded-md shadow-lg transform transition-all duration-300';
      } else if (type === 'error') {
        statusNotification.className = 'fixed bottom-4 right-4 bg-red-100 border border-red-400 text-red-800 px-4 py-3 rounded-md shadow-lg transform transition-all duration-300';
      } else {
        statusNotification.className = 'fixed bottom-4 right-4 bg-blue-100 border border-blue-400 text-blue-800 px-4 py-3 rounded-md shadow-lg transform transition-all duration-300';
      }
      
      // Show notification
      statusNotification.classList.remove('hidden');
      statusNotification.classList.add('status-update');
      
      // Hide after 3 seconds
      setTimeout(() => {
        statusNotification.classList.add('hidden');
        statusNotification.classList.remove('status-update');
      }, 3000);
    }

    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase().trim();
      if (query === '') {
        renderStudents(allStudents);
        return;
      }
      
      const filtered = allStudents.filter(({ student }) =>
        student.name.toLowerCase().includes(query) || 
        student.email.toLowerCase().includes(query)
      );
      renderStudents(filtered);
    });

    // Listen for storage events to detect when reviews are completed in other tabs/windows
    window.addEventListener('storage', function(event) {
      if (event.key === 'reviewCompleted') {
        const data = JSON.parse(event.newValue);
        if (data && data.studentId) {
          fetchStudents(); // Refresh the data
          showNotification(`Review for student completed`, 'success');
        }
      }
    });

    // Initialize page
    fetchStudents();

    // Set up auto-refresh every 5 minutes
    setInterval(fetchStudents, 5 * 60 * 1000);
  </script>
</body>
</html>
