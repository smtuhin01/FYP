<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Student</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Student Data</h2>
    <div id="studentDetails" class="space-y-4">
      <!-- Student parameter and overlay data rendered here -->
    </div>
    <div class="mt-6">
      <textarea id="comment" class="w-full p-2 border rounded" placeholder="Write your feedback and mark here..."></textarea>
      <button id="sendFeedback" class="mt-2 bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Send Feedback</button>
    </div>
  </div>

  <script>
    const studentId = localStorage.getItem('selectedStudentId');

    async function loadStudentData() {
      const res = await fetch(`http://localhost:5001/api/lecturer/student-data/${studentId}`);
      const data = await res.json();

      const container = document.getElementById('studentDetails');
      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'border p-4 rounded';
        div.innerHTML = `
          <h4 class="font-semibold">Image: ${item.imageName}</h4>
          <p><strong>FOV:</strong> ${item.parameters.geometry.fov}</p>
          <p><strong>Matrix:</strong> ${item.parameters.geometry.matrixSize}</p>
          <p><strong>TR/TE:</strong> ${item.parameters.sequence.tr} / ${item.parameters.sequence.te}</p>
          <p><strong>Overlay:</strong> Left: ${item.overlay?.left || 'N/A'}, Top: ${item.overlay?.top || 'N/A'}, Width: ${item.overlay?.width || 'N/A'}, Height: ${item.overlay?.height || 'N/A'}, Angle: ${item.overlay?.angle || 'N/A'}</p>
        `;
        container.appendChild(div);
      });
    }

    document.getElementById('sendFeedback').addEventListener('click', async () => {
      const comment = document.getElementById('comment').value;
      await fetch('http://localhost:5001/api/lecturer/send-feedback', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ studentId, comment })
      });
      alert('Feedback sent successfully!');
    });

    loadStudentData();
  </script>
</body>
</html>
