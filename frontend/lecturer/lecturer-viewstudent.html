<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Student Simulation</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
.image-container {
position: relative;
width: 300px;
height: 300px;
border: 2px solid #ccc;
margin: 20px;
display: inline-block;
overflow: hidden; /* Ensure overlay stays within bounds */
}

.medical-image {
width: 100%;
height: 100%;
object-fit: cover;
}

.overlay-rectangle {
position: absolute;
border: 3px solid red;
background-color: rgba(255, 0, 0, 0.2);
pointer-events: none;
z-index: 15;
box-sizing: border-box;
}

.image-label {
position: absolute;
top: 0;
left: 0;
background: rgba(0, 0, 0, 0.7);
color: white;
padding: 5px 10px;
font-size: 14px;
z-index: 15;
}

.image-info {
padding: 10px;
background: #f5f5f5;
font-size: 12px;
}
</style>
</head>
<body class="min-h-screen bg-gray-100 p-8">

<header class="mb-8">
<h1 class="text-3xl font-bold text-gray-800 mb-4">Student Simulation Viewer</h1>
<button onclick="window.history.back()" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded">
← Back to Dashboard
</button>
</header>

<main>
<div class="bg-white rounded-lg shadow-lg p-6 mb-8">
<h2 class="text-xl font-semibold mb-6">Student's Image Configurations</h2>
<div id="imageViewer" class="flex flex-wrap">
<!-- Images will be inserted here -->
</div>
</div>

<!-- Feedback Section -->
<div class="bg-white rounded-lg shadow-lg p-6">
<h3 class="text-lg font-semibold mb-4">Leave Feedback</h3>
<textarea id="comment" class="w-full p-3 border rounded mb-4" rows="4" placeholder="Write your feedback here..."></textarea>
<input type="number" id="mark" class="w-full p-3 border rounded mb-4" placeholder="Enter score/mark (0-100)">
<button id="sendFeedback" class="w-full bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
Submit Feedback
</button>
</div>
</main>

<script>
const urlParams = new URLSearchParams(window.location.search);
const studentId = urlParams.get('userId');
const token = localStorage.getItem('lecturerToken');

async function fetchStudentImages() {
try {
const res = await fetch(`http://localhost:5001/api/parameters/student/${studentId}`, {
headers: { 'Authorization': `Bearer ${token}` }
});
return await res.json();
} catch (error) {
console.error('Error fetching student data:', error);
return [];
}
}

function createSimpleOverlay(container, overlayData) {
// Remove any existing overlay first
const existingOverlay = container.querySelector('.overlay-rectangle');
if (existingOverlay) {
existingOverlay.remove();
}

// Get the actual image element
const img = container.querySelector('.medical-image');
if (!img) {
console.error('No image found in container');
return;
}

console.log('Creating overlay with data:', overlayData);

if (!overlayData) {
// Create default overlay in the center
const defaultOverlay = document.createElement('div');
defaultOverlay.className = 'overlay-rectangle';
defaultOverlay.style.left = '75px';
defaultOverlay.style.top = '75px';
defaultOverlay.style.width = '150px';
defaultOverlay.style.height = '150px';
container.appendChild(defaultOverlay);
console.log('Created default overlay');
return;
}

// Create overlay from data - EXACT SAME LOGIC AS STUDENT PORTAL
const overlay = document.createElement('div');
overlay.className = 'overlay-rectangle';

// Check if this is percentage format (from student portal)
if (overlayData.leftPercent !== undefined) {
console.log('Converting percentage overlay data to absolute positioning');

// Get container dimensions (300x300 in our case)
const containerWidth = 300;
const containerHeight = 300;

// Get image natural dimensions
const imgNaturalWidth = img.naturalWidth || 256;
const imgNaturalHeight = img.naturalHeight || 256;

// Calculate how the image is displayed within the container (object-fit: cover)
const containerAspect = containerWidth / containerHeight;
const imageAspect = imgNaturalWidth / imgNaturalHeight;

let displayedWidth, displayedHeight, offsetX, offsetY;

if (imageAspect > containerAspect) {
// Image is wider - fits to container height
displayedWidth = containerWidth;
displayedHeight = containerWidth / imageAspect;
offsetX = 0;
offsetY = (containerHeight - displayedHeight) / 2;
} else {
// Image is taller - fits to container width
displayedWidth = containerHeight * imageAspect;
displayedHeight = containerHeight;
offsetX = (containerWidth - displayedWidth) / 2;
offsetY = 0;
}

// Convert percentage coordinates to absolute pixels
const left = offsetX + (overlayData.leftPercent / 100) * displayedWidth;
const top = offsetY + (overlayData.topPercent / 100) * displayedHeight;
const width = (overlayData.widthPercent / 100) * displayedWidth;
const height = (overlayData.heightPercent / 100) * displayedHeight;

overlay.style.left = Math.round(left) + 'px';
overlay.style.top = Math.round(top) + 'px';
overlay.style.width = Math.round(width) + 'px';
overlay.style.height = Math.round(height) + 'px';

console.log('Percentage conversion result:', {
containerSize: { width: containerWidth, height: containerHeight },
imageNatural: { width: imgNaturalWidth, height: imgNaturalHeight },
displayed: { width: displayedWidth, height: displayedHeight, offsetX, offsetY },
percentages: {
left: overlayData.leftPercent,
top: overlayData.topPercent,
width: overlayData.widthPercent,
height: overlayData.heightPercent
},
finalPosition: { left, top, width, height }
});

} else {
// Use absolute values directly
overlay.style.left = (overlayData.left || 75) + 'px';
overlay.style.top = (overlayData.top || 75) + 'px';
overlay.style.width = (overlayData.width || 150) + 'px';
overlay.style.height = (overlayData.height || 150) + 'px';

console.log('Using absolute overlay data');
}

if (overlayData.angle) {
overlay.style.transform = `rotate(${overlayData.angle}deg)`;
overlay.style.transformOrigin = 'center';
}

// Ensure proper positioning
overlay.style.position = 'absolute';
overlay.style.zIndex = '15';

container.appendChild(overlay);
console.log('✅ Overlay created and positioned');
}

function createImageCard(data) {
const card = document.createElement('div');
card.className = 'bg-white rounded-lg shadow-md overflow-hidden';

const imageContainer = document.createElement('div');
imageContainer.className = 'image-container';

// Image label
const label = document.createElement('div');
label.className = 'image-label';
label.textContent = data.imageName;

// Medical image
const img = document.createElement('img');
img.className = 'medical-image';
img.src = `http://localhost:5001/cardic/${data.imageName.replace(/ /g, '_')}_thumb.jpg`;
img.alt = data.imageName;
img.onerror = () => {
img.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZGRkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtc2l6ZT0iMTgiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5JbWFnZSBOb3QgRm91bmQ8L3RleHQ+PC9zdmc+';
};

// Add elements to container
imageContainer.appendChild(img);
imageContainer.appendChild(label);

// Create overlay after image loads
img.onload = () => {
console.log('Image loaded, creating overlay for:', data.imageName);
// Wait a bit for image to render properly
setTimeout(() => {
createSimpleOverlay(imageContainer, data.overlay);
}, 100);
};

// If image is already cached
if (img.complete) {
console.log('Image already cached, creating overlay for:', data.imageName);
// Wait a bit for DOM to settle
setTimeout(() => {
createSimpleOverlay(imageContainer, data.overlay);
}, 100);
}

// Image info
const geom = data.parameters.geometry;
const seq = data.parameters.sequence;

const info = document.createElement('div');
info.className = 'image-info';
info.innerHTML = `
<div><strong>FOV:</strong> ${geom.fov}mm | <strong>Matrix:</strong> ${geom.matrixSize}</div>
<div><strong>TR:</strong> ${seq.tr}ms | <strong>TE:</strong> ${seq.te}ms</div>
<div><strong>Thickness:</strong> ${geom.sliceThickness}mm | <strong>Angle:</strong> ${seq.flipAngle}°</div>
<div><strong>Sequence:</strong> ${seq.pulseSequence}</div>
<div><strong>Orientation:</strong> ${geom.planeOrientation}</div>
`;

card.appendChild(imageContainer);
card.appendChild(info);

return card;
}

async function init() {
console.log('🚀 Starting simple lecturer view...');

try {
const data = await fetchStudentImages();
const viewer = document.getElementById('imageViewer');

console.log('📊 Student data:', data);

if (!data || data.length === 0) {
viewer.innerHTML = '<div class="text-center py-12 text-gray-500">No student data found</div>';
return;
}

// Clear viewer
viewer.innerHTML = '';

// Create cards for each image
data.forEach((imageData, index) => {
console.log(`🖼️ Creating card ${index + 1} for:`, imageData.imageName);
console.log(`📊 Overlay data:`, imageData.overlay);

const card = createImageCard(imageData);
viewer.appendChild(card);
});

console.log('✅ All cards created successfully');

} catch (error) {
console.error('❌ Error in initialization:', error);
document.getElementById('imageViewer').innerHTML =
'<div class="text-center py-12 text-red-500">Error loading student data</div>';
}
}

// Feedback submission
document.getElementById('sendFeedback').addEventListener('click', async () => {
const comment = document.getElementById('comment').value;
const mark = document.getElementById('mark').value;

if (!comment.trim()) {
alert('Please enter a comment');
return;
}

if (!mark || isNaN(mark) || mark < 0 || mark > 100) {
alert('Please enter a valid mark (0-100)');
return;
}

try {
const res = await fetch('http://localhost:5001/api/lecturer/comment', {
method: 'POST',
headers: {
'Content-Type': 'application/json',
'Authorization': `Bearer ${token}`
},
body: JSON.stringify({
studentId,
comment: comment.trim(),
mark: Number(mark)
})
});

if (res.ok) {
alert('Feedback sent successfully!');
document.getElementById('comment').value = '';
document.getElementById('mark').value = '';
} else {
const data = await res.json();
alert('Failed to send feedback: ' + (data.message || 'Unknown error'));
}
} catch (error) {
console.error('❌ Error sending feedback:', error);
alert('Network error while sending feedback');
}
});

// Start when page loads
document.addEventListener('DOMContentLoaded', () => {
console.log('📄 DOM loaded, initializing...');
init();
});
</script>
</body>
</html>
