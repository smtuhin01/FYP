<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Details</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen p-6">
  <div class="max-w-5xl mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Student Simulation Data</h2>
    <div id="studentDetails" class="space-y-6"></div>

    <div class="mt-8">
      <textarea id="comment" class="w-full p-3 border rounded mb-2" placeholder="Write your feedback here..."></textarea>
      <input type="number" id="mark" class="w-full p-3 border rounded mb-2" placeholder="Enter score/mark">
      <button id="sendFeedback" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Submit Feedback</button>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const studentId = urlParams.get('userId');
    const token = localStorage.getItem('lecturerToken');

    async function loadStudentData() {
      const res = await fetch(`http://localhost:5001/api/parameters/student/${studentId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();

      const container = document.getElementById('studentDetails');
      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'border p-4 rounded bg-gray-50';
        div.innerHTML = `
          <h4 class="font-semibold">Image: ${item.imageName}</h4>
          <p><strong>FOV:</strong> ${item.parameters.geometry.fov}</p>
          <p><strong>Matrix:</strong> ${item.parameters.geometry.matrixSize}</p>
          <p><strong>TR/TE:</strong> ${item.parameters.sequence.tr} / ${item.parameters.sequence.te}</p>
          <p><strong>Overlay:</strong> L: ${item.overlay?.left ?? 'N/A'}, T: ${item.overlay?.top ?? 'N/A'}, W: ${item.overlay?.width ?? 'N/A'}, H: ${item.overlay?.height ?? 'N/A'}, A: ${item.overlay?.angle ?? 'N/A'}</p>
        `;
        container.appendChild(div);
      });
    }

    document.getElementById('sendFeedback').addEventListener('click', async () => {
      const comment = document.getElementById('comment').value;
      const mark = document.getElementById('mark').value;

      const res = await fetch('http://localhost:5001/api/lecturer/comment', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ studentId, comment, mark })
      });

      if (res.ok) {
        alert('Feedback sent successfully!');
        document.getElementById('comment').value = '';
        document.getElementById('mark').value = '';
      } else {
        const data = await res.json();
        alert('Failed to send feedback: ' + data.message);
      }
    });

    loadStudentData();
  </script>
</body>
</html>
