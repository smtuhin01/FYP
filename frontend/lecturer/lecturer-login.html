<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecturer Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-sm">
    <h2 class="text-2xl font-bold mb-6 text-center">Lecturer Login</h2>
    <form id="lecturerLoginForm">
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" class="mt-1 p-2 w-full border border-gray-300 rounded-md" required>
      </div>
      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="password" class="mt-1 p-2 w-full border border-gray-300 rounded-md" required>
        <div class="mt-1 text-right">
          <a href="/lecturer/lecturer-reset-password.html" class="text-sm text-blue-500 hover:underline">Forgot Password?</a>
        </div>
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Login</button>
    </form>
  
    <div class="mt-4 text-sm text-center space-y-2">
      <p>
        Don't have an account? <a href="/lecturer/lecturer-register.html" class="text-blue-500 hover:underline">Register</a>
      </p>
    </div>
  </div>

  <script>
  document.getElementById('lecturerLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('http://localhost:5001/api/lecturer/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('lecturerToken', data.token);
        window.location.href = '/lecturer/lecturer-dashboard.html'; // ✅ Go to dashboard
      } else {
        alert(data.error || 'Login failed. Please check your credentials.');
      }
    } catch (err) {
      alert('An error occurred: ' + err.message);
    }
  });
</script>

</body>
</html>
