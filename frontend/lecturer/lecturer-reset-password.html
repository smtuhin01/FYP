<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Lecturer Password</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .reset-container {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    input, button {
      width: 100%;
      padding: 0.75rem;
      margin: 0.5rem 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #39424e;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    
    button:hover {
      background-color: #212730;
    }
    
    .message {
      margin-top: 1rem;
      text-align: center;
      font-weight: bold;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <h2 class="text-2xl font-bold mb-4 text-center">Reset Lecturer Password</h2>
    <input type="email" id="resetEmail" placeholder="Enter your email" required />
    <input type="password" id="newPassword" placeholder="Enter new password" required />
    <input type="password" id="confirmPassword" placeholder="Confirm new password" required />
    <button onclick="resetPassword()">Reset Password</button>
    <div class="message" id="message"></div>
    <p class="mt-4 text-sm text-center">
      <a href="lecturer-login.html" class="text-blue-500 hover:underline">Back to Login</a>
    </p>
  </div>

  <script>
    async function resetPassword() {
      const email = document.getElementById("resetEmail").value.trim();
      const newPassword = document.getElementById("newPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();
      const messageDiv = document.getElementById("message");

      messageDiv.textContent = "";
      messageDiv.className = "message";

      // Validation
      if (!email || !newPassword || !confirmPassword) {
        messageDiv.textContent = "Please fill in all fields.";
        messageDiv.classList.add("error");
        return;
      }

      if (newPassword.length < 4) {
        messageDiv.textContent = "Password must be at least 4 characters.";
        messageDiv.classList.add("error");
        return;
      }

      if (newPassword !== confirmPassword) {
        messageDiv.textContent = "Passwords do not match.";
        messageDiv.classList.add("error");
        return;
      }

      try {
        const response = await fetch("http://localhost:5001/api/lecturer/reset-password", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Accept": "application/json" // Add Accept header
          },
          body: JSON.stringify({ 
            email, 
            newPassword,
            confirmPassword // Include confirm password
          })
        });

        // Fix 2: Add error handling for non-JSON responses
        let data;
        const contentType = response.headers.get("content-type");
        if (contentType && contentType.includes("application/json")) {
          data = await response.json();
        } else {
          throw new Error("Server returned non-JSON response");
        }

        if (response.ok) {
          messageDiv.textContent = "✅ Password reset successful!";
          messageDiv.classList.add("success");
          setTimeout(() => {
            window.location.href = "lecturer-login.html";
          }, 2000);
        } else {
          messageDiv.textContent = "❌ " + (data.message || "Reset failed. Please try again.");
          messageDiv.classList.add("error");
        }
      } catch (err) {
        console.error("Reset password error:", err);
        messageDiv.textContent = "❌ Server connection failed. Please try again later.";
        messageDiv.classList.add("error");
      }
    }
  </script>
</body>
</html>
