<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Imaging Workstation</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="./css/simulation.css" rel="stylesheet">
  
</head>
<body class="min-h-screen bg-gray-50 p-4">
  <header class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Medical Imaging Workstation</h1>
    <div class="flex items-center gap-4">
      <button id="saveRunBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md">
        Save & Run
      </button>
      <div class="relative">
        <button id="notificationBtn" class="text-gray-600 hover:text-gray-800">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span id="notificationBadge" class="notification-badge">2</span>
        </button>
        <div id="notificationPanel" class="notification-panel">
          <div class="p-3 border-b border-gray-100 flex justify-between items-center">
            <h3 class="text-sm font-medium">Notifications</h3>
            <button id="closeNotificationsBtn" class="text-gray-500 hover:text-gray-700">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
          <div class="p-3">
            <ul class="space-y-2 max-h-60 overflow-y-auto" id="notificationsList">
              <li class="notification-item">
                <p class="text-sm">Please review the T2 FLAIR sequence parameters</p>
                <p class="text-xs text-gray-500 mt-1">10:30 AM</p>
              </li>
              <li class="notification-item">
                <p class="text-sm">New protocol added to your workspace</p>
                <p class="text-xs text-gray-500 mt-1">Yesterday</p>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Image Viewer Section -->
    <div class="lg:col-span-3">
      <div class="bg-white rounded-lg shadow-md p-4">
        <h2 class="text-xl font-semibold mb-4">Image Viewer</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="imageViewer">
          <!-- Images will be dynamically inserted here -->
        </div>
      </div>
    </div>

    <!-- Pulse Sequence Section -->
    <div class="lg:col-span-1">
      <div class="bg-white rounded-lg shadow-md">
        <div class="p-4 border-b border-gray-100">
          <div class="flex justify-between items-center">
            <h2 class="text-lg font-semibold">Pulse Sequence</h2>
            <button id="toggleSequenceBtn" class="text-gray-500 hover:text-gray-700">
              <svg id="collapseIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
                <polyline points="18 15 12 9 6 15"></polyline>
              </svg>
              <svg id="expandIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
          </div>
        </div>
        <div id="sequenceContent" class="p-4">
          <div class="sequence-list-container">
            <ul id="sequenceList" class="space-y-1">
              <!-- Sequence items will be dynamically inserted here -->
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Parameter Settings Section -->
    <div class="lg:col-span-2">
      <div class="bg-white rounded-lg shadow-md">
        <div class="p-4 border-b border-gray-100">
          <h2 id="parameterTitle" class="text-lg font-semibold">Set Parameters</h2>
        </div>
        <div class="p-4">
          <div class="flex border-b border-gray-200">
            <button class="tab active" data-tab="geometry">Geometry</button>
            <button class="tab" data-tab="sequence">Sequence</button>
          </div>

          <div id="geometryTab" class="tab-content active space-y-4 mt-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="space-y-2">
                <label for="fov" class="block text-sm font-medium text-gray-700">Field of View (FOV)</label>
                <div class="flex items-center">
                  <input id="fov" type="number" min="100" max="500" value="250" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                  <span class="ml-2 text-sm text-gray-500">mm</span>
                </div>
              </div>

              <div class="space-y-2">
                <label for="matrixSize" class="block text-sm font-medium text-gray-700">Matrix Size</label>
                <select id="matrixSize" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                  <option value="128×128">128×128</option>
                  <option value="256×256" selected>256×256</option>
                  <option value="512×512">512×512</option>
                </select>
              </div>

              <div class="space-y-2">
                <label for="sliceThickness" class="block text-sm font-medium text-gray-700">Slice Thickness</label>
                <div class="flex items-center">
                  <input id="sliceThickness" type="number" min="0.5" max="10" step="0.5" value="3" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                  <span class="ml-2 text-sm text-gray-500">mm</span>
                </div>
              </div>

              <div class="space-y-2">
                <label for="sliceGap" class="block text-sm font-medium text-gray-700">Slice Gap</label>
                <div class="flex items-center">
                  <input id="sliceGap" type="number" min="0" max="5" step="0.1" value="0" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                  <span class="ml-2 text-sm text-gray-500">mm</span>
                </div>
              </div>

              <div class="space-y-2">
                <label for="planeOrientation" class="block text-sm font-medium text-gray-700">Plane Orientation</label>
                <select id="planeOrientation" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                  <option value="Axial" selected>Axial</option>
                  <option value="Coronal">Coronal</option>
                  <option value="Sagittal">Sagittal</option>
                </select>
              </div>

              <div class="space-y-2">
                <label for="foldoverDirection" class="block text-sm font-medium text-gray-700">Fold over Direction</label>
                <select id="foldoverDirection" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                  <option value="Left-Right" selected>Left-Right</option>
                  <option value="Anterior-Posterior">Anterior-Posterior</option>
                </select>
              </div>
            </div>
          </div>

          <div id="sequenceTab" class="tab-content space-y-4 mt-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="space-y-2">
                <label for="tr" class="block text-sm font-medium text-gray-700">TR</label>
                <div class="flex items-center">
                  <input id="tr" type="number" min="300" max="3000" value="500" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                  <span class="ml-2 text-sm text-gray-500">ms</span>
                </div>
              </div>

              <div class="space-y-2">
                <label for="te" class="block text-sm font-medium text-gray-700">TE</label>
                <div class="flex items-center">
                  <input id="te" type="number" min="10" max="150" value="20" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                  <span class="ml-2 text-sm text-gray-500">ms</span>
                </div>
              </div>

              <div class="space-y-2">
                <label for="flipAngle" class="block text-sm font-medium text-gray-700">Flip Angle</label>
                <div class="flex items-center">
                  <input id="flipAngle" type="number" min="0" max="180" value="90" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                  <span class="ml-2 text-sm text-gray-500">°</span>
                </div>
              </div>

              <div class="space-y-2">
                <label for="pulseSequence" class="block text-sm font-medium text-gray-700">Pulse Sequence</label>
                <select id="pulseSequence" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                  <option value="T1-Weighted" selected>T1-Weighted</option>
                  <option value="T2-Weighted">T2-Weighted</option>
                  <option value="FLAIR">FLAIR</option>
                  <option value="DWI">DWI</option>
                  <option value="GRE">GRE</option>
                </select>
              </div>
            </div>
          </div>

          <div class="mt-6 flex justify-end">
            <button id="applyChangesBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md">
              Apply Changes
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="mt-8 flex justify-end">
    <button id="logoutBtn" class="border border-gray-300 text-gray-600 hover:bg-gray-100 px-4 py-2 rounded-md">
      Logout
    </button>
  </footer>

  <script src="./js/simulation.js"></script>
</body>
</html>
