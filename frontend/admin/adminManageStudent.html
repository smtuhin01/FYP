<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Students</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Navigation Header -->
  <header class="bg-white shadow">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex">
          <div class="flex-shrink-0 flex items-center">
            <h1 class="text-xl font-bold text-gray-800">MRI Simulator Admin</h1>
          </div>
          <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
            <a href="adminDashboard.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Dashboard
            </a>
            <a href="adminManageStudent.html" class="border-b-2 border-blue-500 text-gray-900 inline-flex items-center px-1 pt-1 text-sm font-medium">
              Students
            </a>
            <a href="adminManageLecturer.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Lecturers
            </a>
            <a href="adminManageMedia.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Media
            </a>
          </div>
        </div>
        <div class="flex items-center">
          <button id="logoutBtn" class="ml-4 px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700">
            Logout
          </button>
        </div>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <div class="px-4 py-6 sm:px-0">
      <div class="flex justify-between items-center">
        <h2 class="text-2xl font-semibold text-gray-900">Manage Students</h2>
        <button id="addStudentBtn" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700">
          Add New Student
        </button>
      </div>

      <!-- Search and Filter -->
      <div class="mt-4">
        <div class="flex justify-between">
          <div class="relative rounded-md shadow-sm max-w-xs">
            <input type="text" id="searchInput" class="block w-full pr-10 sm:text-sm border-gray-300 rounded-md py-2 px-3 border" placeholder="Search students...">
            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Students Table -->
      <div class="mt-4 flex flex-col">
        <div class="-my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
          <div class="py-2 align-middle inline-block min-w-full sm:px-6 lg:px-8">
            <div class="shadow overflow-hidden border-b border-gray-200 sm:rounded-lg">
              <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                  <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                  </tr>
                </thead>
                <tbody id="studentTableBody" class="bg-white divide-y divide-gray-200">
                  <!-- Student rows will be populated here -->
                  <tr>
                    <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">
                      Loading students...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Add Student Modal -->
  <div id="addStudentModal" class="fixed inset-0 overflow-y-auto hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
      <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>

      <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

      <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
          <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">
            Add New Student
          </h3>
          <div class="mt-4">
            <form id="addStudentForm">
              <div class="mb-4">
                <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" name="name" id="name" class="mt-1 focus:ring-blue-500 focus:border-blue-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
              </div>
              <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" name="email" id="email" class="mt-1 focus:ring-blue-500 focus:border-blue-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
              </div>
              <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" id="password" class="mt-1 focus:ring-blue-500 focus:border-blue-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
              </div>
            </form>
          </div>
        </div>
        <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
          <button type="button" id="saveStudentBtn" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:ml-3 sm:w-auto sm:text-sm">
            Save
          </button>
          <button type="button" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:mt-0 sm:w-auto sm:text-sm close-modal">
            Cancel
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Student Modal -->
  <div id="editStudentModal" class="fixed inset-0 overflow-y-auto hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
      <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>

      <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

      <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
          <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">
            Edit Student
          </h3>
          <div class="mt-4">
            <form id="editStudentForm">
              <input type="hidden" id="editStudentId">
              <div class="mb-4">
                <label for="editName" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" name="editName" id="editName" class="mt-1 focus:ring-blue-500 focus:border-blue-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
              </div>
              <div class="mb-4">
                <label for="editEmail" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" name="editEmail" id="editEmail" class="mt-1 focus:ring-blue-500 focus:border-blue-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
              </div>
            </form>
          </div>
        </div>
        <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
          <button type="button" id="updateStudentBtn" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:ml-3 sm:w-auto sm:text-sm">
            Update
          </button>
          <button type="button" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:mt-0 sm:w-auto sm:text-sm close-modal">
            Cancel
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Check authentication when page loads
    document.addEventListener('DOMContentLoaded', function() {
      const adminToken = localStorage.getItem('adminToken');
      if (!adminToken) {
        window.location.href = 'adminLogin.html';
        return;
      }

      // Fetch students data
      fetchStudents();
    });

    // Logout functionality
    document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.removeItem('adminToken');
      window.location.href = 'adminLogin.html';
    });

    // Fetch students function
    async function fetchStudents() {
      const token = localStorage.getItem('adminToken');
      const tableBody = document.getElementById('studentTableBody');
      
      try {
        const response = await fetch('http://localhost:5001/api/admin/students', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) throw new Error('Failed to fetch students');
        
        const students = await response.json();
        
        tableBody.innerHTML = '';
        
        if (students.length === 0) {
          tableBody.innerHTML = `
            <tr>
              <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">
                No students found
              </td>
            </tr>
          `;
          return;
        }
        
        students.forEach(student => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
              ${student.name}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
              ${student.email}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
              <button class="text-blue-600 hover:text-blue-900 mr-4 edit-btn" data-id="${student._id}" data-name="${student.name}" data-email="${student.email}">
                Edit
              </button>
              <button class="text-red-600 hover:text-red-900 delete-btn" data-id="${student._id}">
                Delete
              </button>
            </td>
          `;
          tableBody.appendChild(row);
        });
        
        // Add event listeners to edit and delete buttons
        document.querySelectorAll('.edit-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = this.getAttribute('data-id');
            const name = this.getAttribute('data-name');
            const email = this.getAttribute('data-email');
            
            document.getElementById('editStudentId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editEmail').value = email;
            
            document.getElementById('editStudentModal').classList.remove('hidden');
          });
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async function() {
            if (confirm('Are you sure you want to delete this student?')) {
              const id = this.getAttribute('data-id');
              await deleteStudent(id);
            }
          });
        });
        
      } catch (error) {
        console.error('Error fetching students:', error);
        tableBody.innerHTML = `
          <tr>
            <td colspan="3" class="px-6 py-4 text-center text-sm text-red-500">
              Error loading students
            </td>
          </tr>
        `;
      }
    }

    // Add student button click
    document.getElementById('addStudentBtn').addEventListener('click', function() {
      document.getElementById('addStudentModal').classList.remove('hidden');
    });

    // Close modals when clicking cancel
    document.querySelectorAll('.close-modal').forEach(btn => {
      btn.addEventListener('click', function() {
        document.getElementById('addStudentModal').classList.add('hidden');
        document.getElementById('editStudentModal').classList.add('hidden');
      });
    });

    // Save student button click
    document.getElementById('saveStudentBtn').addEventListener('click', async function() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!name || !email || !password) {
        alert('Please fill in all fields');
        return;
      }
      
      await createStudent(name, email, password);
    });

    // Update student button click
    document.getElementById('updateStudentBtn').addEventListener('click', async function() {
      const id = document.getElementById('editStudentId').value;
      const name = document.getElementById('editName').value;
      const email = document.getElementById('editEmail').value;
      
      if (!name || !email) {
        alert('Please fill in all fields');
        return;
      }
      
      await updateStudent(id, name, email);
    });

    // Filter students on search input
    document.getElementById('searchInput').addEventListener('input', function() {
      const searchTerm = this.value.toLowerCase();
      const rows = document.querySelectorAll('#studentTableBody tr');
      
      rows.forEach(row => {
        const name = row.cells[0]?.textContent.toLowerCase() || '';
        const email = row.cells[1]?.textContent.toLowerCase() || '';
        
        if (name.includes(searchTerm) || email.includes(searchTerm)) {
          row.style.display = '';
        } else {
          row.style.display = 'none';
        }
      });
    });

    // Create student function
    async function createStudent(name, email, password) {
      const token = localStorage.getItem('adminToken');
      
      try {
        const response = await fetch('http://localhost:5001/api/admin/students', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
          },
          body: JSON.stringify({ name, email, password })
        });
        
        if (!response.ok) {
          const data = await response.json();
          throw new Error(data.message || 'Failed to create student');
        }
        
        document.getElementById('addStudentModal').classList.add('hidden');
        document.getElementById('addStudentForm').reset();
        
        alert('Student created successfully!');
        fetchStudents();
        
      } catch (error) {
        console.error('Error creating student:', error);
        alert(error.message);
      }
    }

    // Update student function
    async function updateStudent(id, name, email) {
      const token = localStorage.getItem('adminToken');
      
      try {
        const response = await fetch(`http://localhost:5001/api/admin/students/${id}`, {
          method: 'PUT',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
          },
          body: JSON.stringify({ name, email })
        });
        
        if (!response.ok) {
          const data = await response.json();
          throw new Error(data.message || 'Failed to update student');
        }
        
        document.getElementById('editStudentModal').classList.add('hidden');
        
        alert('Student updated successfully!');
        fetchStudents();
        
      } catch (error) {
        console.error('Error updating student:', error);
        alert(error.message);
      }
    }

    // Delete student function
    async function deleteStudent(id) {
      const token = localStorage.getItem('adminToken');
      
      try {
        const response = await fetch(`http://localhost:5001/api/admin/students/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) {
          const data = await response.json();
          throw new Error(data.message || 'Failed to delete student');
        }
        
        alert('Student deleted successfully!');
        fetchStudents();
        
      } catch (error) {
        console.error('Error deleting student:', error);
        alert(error.message);
      }
    }
  </script>
</body>
</html>
