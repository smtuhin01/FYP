<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-6">
  <h1 class="text-2xl font-bold mb-4">Manage Users</h1>

  <form id="userForm" class="mb-6 grid grid-cols-2 gap-4">
    <input type="text" id="name" placeholder="Full Name" class="px-3 py-2 border rounded" required>
    <input type="email" id="email" placeholder="Email" class="px-3 py-2 border rounded" required>
    <input type="password" id="password" placeholder="Password" class="px-3 py-2 border rounded" required>
    <select id="role" class="px-3 py-2 border rounded">
      <option value="student">Student</option>
      <option value="lecturer">Lecturer</option>
    </select>
    <button type="submit" class="col-span-2 bg-blue-600 text-white py-2 rounded">Add User</button>
  </form>

  <div>
    <h2 class="text-xl font-semibold mb-2">All Users</h2>
    <div id="userList" class="space-y-2"></div>
  </div>

  <script>
    const token = localStorage.getItem('token');

    async function loadUsers() {
      const res = await fetch('/api/users', {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      const list = document.getElementById('userList');
      list.innerHTML = '';
      [...data.students, ...data.lecturers].forEach(user => {
        const div = document.createElement('div');
        div.className = 'p-4 bg-white rounded shadow flex justify-between items-center';
        div.innerHTML = `<div><strong>${user.name}</strong><br><small>${user.email} (${user.role})</small></div>
                         <button onclick="deleteUser('${user._id}', '${user.role}')" class="bg-red-500 text-white px-3 py-1 rounded">Delete</button>`;
        list.appendChild(div);
      });
    }

    async function deleteUser(id, role) {
      await fetch(`/api/users/${role}/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` }
      });
      loadUsers();
    }

    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      await fetch('/api/users', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ name, email, password, role })
      });
      loadUsers();
      e.target.reset();
    });

    loadUsers();
  </script>
</body>
</html>
