<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Navigation Header -->
  <header class="bg-white shadow">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex">
          <div class="flex-shrink-0 flex items-center">
            <h1 class="text-xl font-bold text-gray-800">MRI Simulator Admin</h1>
          </div>
          <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
            <a href="adminDashboard.html" class="border-b-2 border-blue-500 text-gray-900 inline-flex items-center px-1 pt-1 text-sm font-medium">
              Dashboard
            </a>
            <a href="adminManageStudent.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Students
            </a>
            <a href="adminManageLecturer.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Lecturers
            </a>
            <a href="adminManageMedia.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Media
            </a>
          </div>
        </div>
        <div class="flex items-center">
          <button id="logoutBtn" class="ml-4 px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700">
            Logout
          </button>
        </div>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <div class="px-4 py-6 sm:px-0">
      <h2 class="text-2xl font-semibold text-gray-900">Admin Dashboard</h2>
      
      <!-- Dashboard Summary Cards -->
      <div class="mt-6 grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4">
        <!-- Students Card -->
        <div class="bg-white overflow-hidden shadow rounded-lg">
          <div class="px-4 py-5 sm:p-6">
            <div class="flex items-center">
              <div class="flex-shrink-0 bg-blue-500 rounded-md p-3">
                <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
              </div>
              <div class="ml-5 w-0 flex-1">
                <dl>
                  <dt class="text-sm font-medium text-gray-500 truncate">Total Students</dt>
                  <dd>
                    <div class="text-lg font-medium text-gray-900" id="studentCount">Loading...</div>
                  </dd>
                </dl>
              </div>
            </div>
          </div>
          <div class="bg-gray-50 px-4 py-4 sm:px-6">
            <a href="adminManageStudent.html" class="text-sm font-medium text-blue-600 hover:text-blue-500">View all students <span aria-hidden="true">&rarr;</span></a>
          </div>
        </div>

        <!-- Lecturers Card -->
        <div class="bg-white overflow-hidden shadow rounded-lg">
          <div class="px-4 py-5 sm:p-6">
            <div class="flex items-center">
              <div class="flex-shrink-0 bg-green-500 rounded-md p-3">
                <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
              </div>
              <div class="ml-5 w-0 flex-1">
                <dl>
                  <dt class="text-sm font-medium text-gray-500 truncate">Total Lecturers</dt>
                  <dd>
                    <div class="text-lg font-medium text-gray-900" id="lecturerCount">Loading...</div>
                  </dd>
                </dl>
              </div>
            </div>
          </div>
          <div class="bg-gray-50 px-4 py-4 sm:px-6">
            <a href="adminManageLecturer.html" class="text-sm font-medium text-blue-600 hover:text-blue-500">View all lecturers <span aria-hidden="true">&rarr;</span></a>
          </div>
        </div>

        <!-- Media Files Card -->
        <div class="bg-white overflow-hidden shadow rounded-lg">
          <div class="px-4 py-5 sm:p-6">
            <div class="flex items-center">
              <div class="flex-shrink-0 bg-purple-500 rounded-md p-3">
                <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
              </div>
              <div class="ml-5 w-0 flex-1">
                <dl>
                  <dt class="text-sm font-medium text-gray-500 truncate">Media Files</dt>
                  <dd>
                    <div class="text-lg font-medium text-gray-900" id="mediaCount">Loading...</div>
                  </dd>
                </dl>
              </div>
            </div>
          </div>
          <div class="bg-gray-50 px-4 py-4 sm:px-6">
            <a href="adminManageMedia.html" class="text-sm font-medium text-blue-600 hover:text-blue-500">View all media <span aria-hidden="true">&rarr;</span></a>
          </div>
        </div>

        <!-- System Status Card -->
        <div class="bg-white overflow-hidden shadow rounded-lg">
          <div class="px-4 py-5 sm:p-6">
            <div class="flex items-center">
              <div class="flex-shrink-0 bg-yellow-500 rounded-md p-3">
                <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.025 12.025 0 002 12c0 6.627 5.373 12 12 12s12-5.373 12-12c0-1.633-.313-3.175-.882-4.586M12 8v4l3 3" />
                </svg>
              </div>
              <div class="ml-5 w-0 flex-1">
                <dl>
                  <dt class="text-sm font-medium text-gray-500 truncate">System Status</dt>
                  <dd>
                    <div class="text-lg font-medium text-gray-900" id="systemStatus">Loading...</div>
                  </dd>
                </dl>
              </div>
            </div>
          </div>
          <div class="bg-gray-50 px-4 py-4 sm:px-6">
            
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
  // Check authentication when page loads
  document.addEventListener('DOMContentLoaded', function() {
    const adminToken = localStorage.getItem('adminToken');
    if (!adminToken) {
      window.location.href = 'adminLogin.html';
      return;
    }

    // Fetch dashboard data
    fetchDashboardData();

    // Setup logout functionality
    document.getElementById('logoutBtn').addEventListener('click', function() {
      localStorage.removeItem('adminToken');
      window.location.href = 'adminLogin.html';
    });
  });

  async function fetchDashboardData() {
    const token = localStorage.getItem('adminToken');
    const headers = { 'Authorization': `Bearer ${token}` };

    try {
      // Remove activities fetch
      const [studentsRes, lecturersRes, mediaRes] = await Promise.all([
        fetch('http://localhost:5001/api/admin/students', { headers }),
        fetch('http://localhost:5001/api/admin/lecturers', { headers }),
        fetch('http://localhost:5001/api/admin/media', { headers })
      ]);

      // Update student count
      if (studentsRes.ok) {
        const students = await studentsRes.json();
        document.getElementById('studentCount').textContent = students.length;
      }

      // Update lecturer count
      if (lecturersRes.ok) {
        const lecturers = await lecturersRes.json();
        document.getElementById('lecturerCount').textContent = lecturers.length;
      }

      // Update media count
      if (mediaRes.ok) {
        const media = await mediaRes.json();
        document.getElementById('mediaCount').textContent = media.length;
      }

      // Update system status
      document.getElementById('systemStatus').innerHTML = `
        <span class="text-green-600 font-medium">Active</span>
        <p class="text-sm text-gray-500 mt-1">Last checked: ${new Date().toLocaleString()}</p>
      `;

    } catch (error) {
      console.error('Error fetching dashboard data:', error);
      document.getElementById('studentCount').textContent = 'Error';
      document.getElementById('lecturerCount').textContent = 'Error';
      document.getElementById('mediaCount').textContent = 'Error';
      document.getElementById('systemStatus').innerHTML = `
        <span class="text-red-600 font-medium">Error</span>
        <p class="text-sm text-gray-500 mt-1">Failed to load data</p>
      `;
    }
  }

  // Auto refresh dashboard every 30 seconds
  setInterval(fetchDashboardData, 30000);
  </script>
</body>
</html>
