<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Media</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .preview-container {
      position: relative;
      height: 200px;
      overflow: hidden;
      border-radius: 0.375rem;
    }
    .preview-container img, .preview-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .media-type-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 8px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Navigation Header -->
  <header class="bg-white shadow">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex">
          <div class="flex-shrink-0 flex items-center">
            <h1 class="text-xl font-bold text-gray-800">MRI Simulator Admin</h1>
          </div>
          <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
            <a href="adminDashboard.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Dashboard
            </a>
            <a href="adminManageStudent.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Students
            </a>
            <a href="adminManageLecturer.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
              Lecturers
            </a>
            <a href="adminManageMedia.html" class="border-b-2 border-blue-500 text-gray-900 inline-flex items-center px-1 pt-1 text-sm font-medium">
              Media
            </a>
          </div>
        </div>
        <div class="flex items-center">
          <button id="logoutBtn" class="ml-4 px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700">
            Logout
          </button>
        </div>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <!-- Upload Section -->
    <div class="bg-white shadow rounded-lg p-6 mb-6">
      <h2 class="text-lg font-medium mb-4">Upload New Media</h2>
      <form id="uploadForm" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">Name</label>
            <input type="text" id="mediaName" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Category</label>
            <select id="category" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" required>
              <option value="Brain">Brain</option>
              <option value="Spine">Spine</option>
              <option value="Abdominal">Abdominal</option>
              <option value="Cardiac">Cardiac</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Media Type</label>
            <select id="mediaType" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" required>
              <option value="image">Image</option>
              <option value="video">Video</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">File</label>
            <input type="file" id="mediaFile" class="mt-1 block w-full" accept="image/*,video/*" required>
          </div>
        </div>

        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
          Upload Media
        </button>
      </form>
    </div>

    <!-- Media Library -->
    <div class="bg-white shadow rounded-lg p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-medium">Media Library</h2>
        <div class="flex gap-2">
          <select id="filterCategory" class="border border-gray-300 rounded-md shadow-sm p-2">
            <option value="">All Categories</option>
            <option value="Brain">Brain</option>
            <option value="Spine">Spine</option>
            <option value="Abdominal">Abdominal</option>
            <option value="Cardiac">Cardiac</option>
          </select>
          <select id="filterType" class="border border-gray-300 rounded-md shadow-sm p-2">
            <option value="">All Types</option>
            <option value="image">Images</option>
            <option value="video">Videos</option>
          </select>
        </div>
      </div>

      <div id="mediaGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
        <!-- Media items will be dynamically inserted here -->
      </div>
    </div>
  </main>

  <script>
    // Define default MRI parameters
    const DEFAULT_MRI_PARAMETERS = {
      geometry: {
        fov: 250,
        matrixSize: "256×256",
        sliceThickness: 3,
        sliceGap: 0,
        planeOrientation: "Axial",
        foldoverDirection: "Left-Right"
      },
      sequence: {
        tr: 500,
        te: 20,
        flipAngle: 90,
        pulseSequence: "T1-Weighted"
      }
    };

    document.addEventListener('DOMContentLoaded', function() {
      const adminToken = localStorage.getItem('adminToken');
      if (!adminToken) {
        window.location.href = 'adminLogin.html';
        return;
      }

      fetchMedia();

      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('adminToken');
        window.location.href = 'adminLogin.html';
      });
    });

    // Handle form submission
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData();
      const file = document.getElementById('mediaFile').files[0];
      
      if (!file) {
        alert('Please select a file to upload');
        return;
      }

      try {
        // Show loading state
        const submitButton = e.target.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.innerHTML = 'Uploading...';

        formData.append('file', file);
        formData.append('name', document.getElementById('mediaName').value);
        formData.append('category', document.getElementById('category').value);
        formData.append('mediaType', document.getElementById('mediaType').value);
        formData.append('parameters', JSON.stringify(DEFAULT_MRI_PARAMETERS));

        const response = await fetch('http://localhost:5001/api/admin/media', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
          },
          body: formData
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.message || 'Upload failed');
        }

        const result = await response.json();
        alert('Media uploaded successfully!');
        fetchMedia();
        e.target.reset();
      } catch (error) {
        console.error('Upload error:', error);
        alert('Error uploading media: ' + error.message);
      } finally {
        // Reset button state
        const submitButton = e.target.querySelector('button[type="submit"]');
        submitButton.disabled = false;
        submitButton.innerHTML = 'Upload Media';
      }
    });

    // Fetch and display media
    async function fetchMedia() {
      try {
        const response = await fetch('http://localhost:5001/api/admin/media', {
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
          }
        });

        if (!response.ok) throw new Error('Failed to fetch media');

        const media = await response.json();
        displayMedia(media);
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function displayMedia(mediaItems) {
      const grid = document.getElementById('mediaGrid');
      grid.innerHTML = '';

      mediaItems.forEach(item => {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-lg shadow overflow-hidden';
        card.innerHTML = `
          <div class="preview-container">
            ${item.mediaType === 'image' 
              ? `<img src="http://localhost:5001/media/${item.filename}" alt="${item.name}">`
              : `<video src="http://localhost:5001/media/${item.filename}" controls></video>`
            }
            <span class="media-type-badge ${item.mediaType === 'image' ? 'bg-blue-500' : 'bg-green-500'} text-white">
              ${item.mediaType}
            </span>
          </div>
          <div class="p-4">
            <h3 class="font-medium text-gray-900">${item.name}</h3>
            <p class="text-sm text-gray-500">${item.category}</p>
            <button onclick="deleteMedia('${item._id}')" class="mt-2 text-red-600 hover:text-red-900 text-sm">
              Delete
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    async function deleteMedia(id) {
      if (!confirm('Are you sure you want to delete this media?')) return;

      try {
        const response = await fetch(`http://localhost:5001/api/admin/media/${id}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
          }
        });

        if (!response.ok) throw new Error('Failed to delete media');

        alert('Media deleted successfully!');
        fetchMedia();
      } catch (error) {
        alert('Error deleting media: ' + error.message);
      }
    }

    // Filter handlers
    document.getElementById('filterCategory').addEventListener('change', filterMedia);
    document.getElementById('filterType').addEventListener('change', filterMedia);

    function filterMedia() {
      const category = document.getElementById('filterCategory').value;
      const type = document.getElementById('filterType').value;
      const items = document.querySelectorAll('#mediaGrid > div');

      items.forEach(item => {
        const itemCategory = item.querySelector('p').textContent;
        const itemType = item.querySelector('.media-type-badge').textContent.trim();
        
        const categoryMatch = !category || itemCategory === category;
        const typeMatch = !type || itemType === type;

        item.style.display = categoryMatch && typeMatch ? 'block' : 'none';
      });
    }
  </script>
</body>
</html>
